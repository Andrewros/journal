<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Question Practice</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="practice-panel">
        <div class="status-row">
          <span id="progress">0 / 0</span>
          <span id="voiceStatus">Voice ready</span>
        </div>

        <p class="label" id="modeLabel">Question</p>
        <h1 id="promptText">Add questions and answers in script.js to begin.</h1>

        <div class="controls">
          <button id="startButton" type="button">Start</button>
          <button id="nextButton" type="button">Next</button>
          <button id="listenButton" type="button" aria-pressed="false">Listen for "next"</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
